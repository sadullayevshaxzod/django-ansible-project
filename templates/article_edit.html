{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Postni tahrirlash{% endblock title %}

{% block content %}
<h1 class="mb-4">Postni tahrirlash</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{form.media}}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Saqlash</button>
    <a href="{% url 'article_list' %}" class="btn btn-secondary">Orqaga</a>
</form>
{% endblock content %}
